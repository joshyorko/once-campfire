<%
require "dotenv"
Dotenv.load(".env.kamal.local") if File.exist?(".env.kamal.local")
s3_endpoint = ENV.fetch("S3_ENDPOINT")
s3_region = ENV.fetch("S3_REGION", "us-east-1")
s3_force_path_style = ENV.fetch("S3_FORCE_PATH_STYLE", "true")
s3_bucket = ENV.fetch("S3_BUCKET", "once-campfire-production")
s3_bucket_setup_enabled = ENV.fetch("S3_BUCKET_SETUP_ENABLED", "false")
%>

# Name of this app
service: once-campfire
image: once-campfire


#-- About your deployment --#

# Where to deploy once-campfire
servers:
  web:
    - 10.10.10.106

# How you connect to your server
ssh:
  user: kdlocpanda

# Cloudflare Tunnel handles public TLS; Kamal proxy serves local origin HTTP
proxy:
  host: campfire.yorko.io
  app_port: 80
  ssl_redirect: true
  forward_headers: true
  ssl: false
  run:
    bind_ips:
      - 127.0.0.1

# Your application configuration (secrets come from .kamal/secrets).
env:
  secret:
    - SECRET_KEY_BASE
    - VAPID_PUBLIC_KEY
    - VAPID_PRIVATE_KEY
    - S3_ACCESS_KEY_ID
    - S3_SECRET_ACCESS_KEY
    - AWS_ACCESS_KEY_ID:S3_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY:S3_SECRET_ACCESS_KEY
  clear:
    ACTIVE_STORAGE_SERVICE: s3
    S3_ENDPOINT: <%= s3_endpoint %>
    S3_REGION: <%= s3_region %>
    S3_FORCE_PATH_STYLE: <%= s3_force_path_style %>
    S3_BUCKET_SETUP_ENABLED: <%= s3_bucket_setup_enabled %>
    S3_BUCKET: <%= s3_bucket %>
    AWS_REGION: <%= s3_region %>


accessories:
  cloudflared:
    image: cloudflare/cloudflared:latest
    host: 10.10.10.106
    cmd: tunnel --no-autoupdate run
    env:
      secret:
        - TUNNEL_TOKEN:CLOUDFLARED_TOKEN


#-- General configuration --#

# Use a local registry to deploy
registry:
  server: localhost:5555

# Handy aliases for interacting with your deployment. For eaxmple: `bin/kamal console` will connect to a
# Rails console in production.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

# Use a persistent host path for sqlite database files and local Active Storage files.
volumes:
  - "/home/kdlocpanda/once-campfire-data/storage:/rails/storage"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
  context: .
